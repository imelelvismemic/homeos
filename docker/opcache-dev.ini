; Bind-mounting the host source over /var/www/html (docker-compose.override.yml)
; makes every opcache timestamp check stat() the whole vendor tree through a much
; slower filesystem path than a native one — on Windows this alone can turn a
; ~50ms request into 40+ seconds. Trade-off: after editing PHP files, run
; `docker compose restart app` (or queue-worker/scheduler) to see the change.
opcache.validate_timestamps=0
