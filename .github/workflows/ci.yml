name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        # Kredencijali usklađeni sa .env.example (homeos / secret) da CI ne mora
        # prepisivati DB_USERNAME/DB_PASSWORD — mysql image daje MYSQL_USER pun
        # pristup na MYSQL_DATABASE, pa `homeos` može migrirati homeos_test.
        env:
          MYSQL_DATABASE: homeos_test
          MYSQL_USER: homeos
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql, pdo_sqlite, redis, bcmath, intl, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Copy .env
        run: cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        # `npm install`, ne `npm ci`: Vite 8 (rolldown) ima platform-specifične
        # native binarke, a package-lock.json je generisan na Alpine (musl) pa
        # nema resolved glibc (gnu) unos — `npm ci` bi na Ubuntu runneru pao. npm
        # install razriješi ispravnu binarku za platformu. (isto u Dockerfile-u)
        run: npm install --no-audit --no-fund

      - name: Build front-end assets
        run: npm run build

      - name: Generate app key
        run: php artisan key:generate

      - name: Configure environment for CI
        run: |
          php -r '
            $env = file_get_contents(".env");
            $env = str_replace("DB_HOST=mysql", "DB_HOST=127.0.0.1", $env);
            $env = str_replace("DB_DATABASE=homeosdb", "DB_DATABASE=homeos_test", $env);
            $env = str_replace("REDIS_HOST=redis", "REDIS_HOST=127.0.0.1", $env);
            $env = str_replace("MAIL_MAILER=resend", "MAIL_MAILER=array", $env);
            file_put_contents(".env", $env);
          '
          # DB_USERNAME=homeos i DB_PASSWORD=secret iz .env.example se poklapaju sa
          # mysql servisom iznad — ne diramo ih.

      - name: Run migrations
        run: php artisan migrate --force

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Test (Pest)
        run: vendor/bin/pest
