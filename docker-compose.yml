services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUN_MIGRATIONS: "true"
    env_file: .env
    depends_on:
      - mysql
      - redis
    healthcheck:
      # Migrations run before php-fpm starts (docker/entrypoint.sh) — without
      # this, nginx starts forwarding requests before php-fpm is listening,
      # causing 502s during the whole startup/migration window.
      test: ["CMD", "nc", "-z", "127.0.0.1", "9000"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "127.0.0.1:${APP_INTERNAL_PORT:-8091}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      app:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-homeosdb}
      MYSQL_USER: ${DB_USERNAME:-homeos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

  redis:
    image: redis:7-alpine

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work redis --tries=3 --backoff=3
    environment:
      RUN_MIGRATIONS: "false"
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_started
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan schedule:work
    environment:
      RUN_MIGRATIONS: "false"
    env_file: .env
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_started
      redis:
        condition: service_started

volumes:
  mysql-data:
